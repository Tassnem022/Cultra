<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country — Cultura</title>
  <link rel="stylesheet" href="assets/fonts/fonts.css" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="country.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="nav-logo">Cultu<span>ra</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="#community" class="nav-cta">Share Story →</a></li>
    </ul>
  </nav>

  <!-- HERO BANNER -->
  <div class="country-hero" id="countryHero">
    <div class="hero-bg" id="heroBg">
      <div class="hero-video-wrap" id="heroVideoWrap">
        <iframe id="heroVideoFrame"
          class="hero-video-frame"
          src=""
          title="Country background video"
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div>
        <span class="hero-flag" id="heroFlag"></span>
        <div class="hero-country-name" id="heroName"></div>
        <div class="hero-region">
          <i class="fa-solid fa-location-dot"></i>
          <span id="heroRegion"></span>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-num" id="heroRecipes"></span>
          <span class="hero-stat-label">Recipes</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-num" id="heroStories"></span>
          <span class="hero-stat-label">Stories</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-num" id="heroFacts"></span>
          <span class="hero-stat-label">Fun Facts</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BACK BUTTON -->
  <div class="back-bar">
    <a href="explore.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
      Back to Explore
    </a>
  </div>

  <!-- PAGE BODY: main col + sidebar -->
  <div class="page-body">

    <!-- ── MAIN COLUMN ── -->
    <div class="main-col">

      <!-- MAP -->
      <div class="map-section">
        <div class="section-label">Navigate</div>
        <div class="section-title" id="mapTitle"></div>
        <div class="map-frame">
          <iframe id="mapFrame" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>

      <!-- CULTURE -->
      <div class="content-section">
        <div class="section-label">Culture</div>
        <div class="section-title" id="cultureTitle"></div>
        <p class="body-text" id="cultureText"></p>
        <div class="facts-row" id="factsRow"></div>
      </div>

      <!-- FOOD & RECIPES -->
      <div class="content-section">
        <div class="section-label">Food & Recipes</div>
        <div class="section-title" id="foodTitle"></div>
        <p class="body-text" id="foodIntro"></p>
        <div id="dishesContainer" style="margin-top: 28px;"></div>
      </div>

      <!-- COMMUNITY -->
      <div class="community-section" id="community">
        <div class="section-label">From the people</div>
        <div class="section-title" id="communityTitle"></div>
        <p class="body-text" style="margin-bottom: 28px;" id="communityDesc"></p>

        <!-- Submit form -->
        <div class="community-form">
          <div class="form-row">
            <div class="form-group">
              <label>Your Name</label>
              <input type="text" id="inputName" placeholder="e.g. Sara Ahmed" />
            </div>
            <div class="form-group">
              <label>Your City</label>
              <input type="text" id="inputCity" placeholder="e.g. Cairo, Egypt" />
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 16px;">
            <label>Your Story or Cultural Fact</label>
            <textarea id="inputStory"
              placeholder="Share something about this culture that most people don't know..."></textarea>
          </div>
          <button class="btn-primary" onclick="submitStory()">
            <i class="fa-solid fa-paper-plane"></i>
            Submit Story
          </button>
        </div>

        <!-- Stories list -->
        <div class="stories-list" id="storiesList"></div>
      </div>

    </div>

    <!-- ── SIDEBAR ── -->
    <div class="side-col">

      <!-- Quick Facts -->
      <div class="quick-facts">
        <div class="side-title">Quick Facts</div>
        <div id="quickFactsList"></div>
      </div>

      <!-- Did You Know -->
      <div class="did-you-know">
        <div class="dyk-label">Did you know?</div>
        <p class="dyk-text" id="didYouKnow"></p>
      </div>

      <!-- Explore More -->
      <div class="explore-more">
        <div class="side-title">Explore More</div>
        <ul class="explore-more-list" id="exploreMoreList"></ul>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html" class="footer-logo">Cultu<span>ra</span></a>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <span>Codex Egypt 2026 · World Without Borders</span>
  </footer>

  <script src="script.js"></script>

</body>

</html>
